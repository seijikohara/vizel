name: CI

# Behaviour-affecting checks (test matrix, visual regression, a11y) live
# here. The workflow runs on every pull request so the required
# `Test Summary` check always reports. A `changes` job detects whether
# any file outside docs/ and *.md changed; the expensive test matrix
# runs only when it did, while `Test Summary` still reports on docs-only
# PRs. The companion `Quality` workflow covers lint, typecheck, and
# writing-rule enforcement on every PR, including Markdown-only ones.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # A push or manual dispatch always exercises the full matrix. On a
      # pull request the matrix runs only when a file outside docs/ and
      # *.md changed; a docs-only PR skips it while `Test Summary` below
      # still reports, so the required check is always satisfied.
      - name: Detect non-docs changes
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}")
          echo "Changed files:"
          echo "$changed"
          if echo "$changed" | grep -vE '^docs/|\.md$' | grep -q .; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test (${{ matrix.framework }}/${{ matrix.browser }})
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [react, vue, svelte]
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tests
        uses: ./.github/actions/test
        with:
          framework: ${{ matrix.framework }}
          browser: ${{ matrix.browser }}

      - name: Save test result
        if: always()
        run: echo "${{ job.status }}" > result.txt

      - name: Upload test result
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-result-${{ matrix.framework }}-${{ matrix.browser }}
          path: result.txt
          retention-days: 1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.framework }}-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  visual:
    name: Visual Regression
    # Snapshots are sensitive to subpixel rendering differences between
    # local machines and CI, so the visual job only runs on manual
    # dispatch. PRs that intentionally change visuals re-run this job
    # (and `test:visual:update`) locally and commit the new baselines.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Install pnpm before `setup-node` so the cache key resolution finds
      # the package manager on PATH. Reversing the order breaks the cache.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Run visual regression tests
        run: pnpm test:visual

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-visual
          path: playwright-report/
          retention-days: 7

  a11y:
    name: A11y (${{ matrix.framework }})
    # Pillar 5 accessibility suite. The experimental-ct dev server leaks a
    # handle on the Linux runner, so the suite passes but the Node process
    # never exits and the job times out (#630). On CI the suite runs the
    # `ct-runner-diagnostics` reporter, which logs the leaking resources and
    # force-exits with the run's status, so the job gates pull requests
    # through `Test Summary`. `timeout-minutes` stays as a safety net.
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_HTML_OPEN: never
    strategy:
      fail-fast: false
      matrix:
        framework: [react, vue, svelte]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Install pnpm before `setup-node` so the cache key resolution finds
      # the package manager on PATH. Reversing the order breaks the cache.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run a11y suite
        env:
          FRAMEWORK: ${{ matrix.framework }}
        run: pnpm "test:a11y:${FRAMEWORK}"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: a11y-report-${{ matrix.framework }}
          path: playwright-report/
          retention-days: 7

  md-roundtrip:
    name: Markdown round-trip
    # Pillar 3 round-trip suite: drives the corpus through Vizel and
    # asserts lossless parse/serialize. Like the a11y suite, the
    # experimental-ct dev server leaks a handle on the Linux runner, so the
    # process hangs after the suite passes (#630). On CI the suite runs the
    # `ct-runner-diagnostics` reporter, which logs the leaking resources and
    # force-exits with the run's status, so the job gates pull requests
    # through `Test Summary`. `timeout-minutes` stays as a safety net.
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_HTML_OPEN: never
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Install pnpm before `setup-node` so the cache key resolution finds
      # the package manager on PATH. Reversing the order breaks the cache.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Markdown round-trip suite
        run: pnpm test:md-roundtrip

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: md-roundtrip-report
          path: playwright-report/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    # `Test Summary` is the single required status check (the "Protect
    # main branch" ruleset). It must report on every pull request, so it
    # depends on `changes` and runs with `if: always()`. On a docs-only
    # PR the test matrix is skipped and this job reports success;
    # otherwise it aggregates the matrix results. The former `ssr` and
    # `ct-parity` needs moved into the `quality-parity` job in
    # `quality.yml` and cannot be referenced from here. The `a11y` and
    # `md-roundtrip` standalone Playwright CT jobs now run on pull requests
    # (the Vite-watcher fix in #630 cleared the runner hang) and gate here
    # through their job-level results.
    needs: [changes, test, a11y, md-roundtrip]
    if: always()
    steps:
      - name: Note docs-only run
        if: ${{ needs.changes.outputs.code != 'true' }}
        run: |
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Docs-only change: the behaviour test matrix was skipped; no behaviour can regress." >> "$GITHUB_STEP_SUMMARY"

      - name: Download all results
        if: ${{ needs.changes.outputs.code == 'true' }}
        uses: actions/download-artifact@v8
        with:
          pattern: test-result-*
          merge-multiple: false

      - name: Generate summary
        if: ${{ needs.changes.outputs.code == 'true' }}
        run: |
          get_status() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⏹️" ;;
              *) echo "❓" ;;
            esac
          }

          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Chromium | Firefox | WebKit |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|:--------:|:-------:|:------:|" >> $GITHUB_STEP_SUMMARY

          for framework in react vue svelte; do
            CHROMIUM=$(cat test-result-${framework}-chromium/result.txt 2>/dev/null || echo "unknown")
            FIREFOX=$(cat test-result-${framework}-firefox/result.txt 2>/dev/null || echo "unknown")
            WEBKIT=$(cat test-result-${framework}-webkit/result.txt 2>/dev/null || echo "unknown")
            FRAMEWORK_NAME=$(echo "$framework" | sed 's/.*/\u&/')
            echo "| $FRAMEWORK_NAME | $(get_status $CHROMIUM) | $(get_status $FIREFOX) | $(get_status $WEBKIT) |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Check overall result
        if: ${{ needs.changes.outputs.code == 'true' }}
        # The behaviour matrix reports through `test-result-*` artifacts.
        # The `a11y` and `md-roundtrip` standalone CT jobs report through
        # their job-level results, gated here alongside the matrix. The
        # result values come from the `needs` context (controlled GitHub
        # values), passed through `env` rather than inlined into the script.
        env:
          A11Y_RESULT: ${{ needs.a11y.result }}
          MD_ROUNDTRIP_RESULT: ${{ needs.md-roundtrip.result }}
        run: |
          FAILED=0
          for framework in react vue svelte; do
            for browser in chromium firefox webkit; do
              RESULT=$(cat test-result-${framework}-${browser}/result.txt 2>/dev/null || echo "unknown")
              if [ "$RESULT" != "success" ]; then
                echo "❌ ${framework}/${browser}: $RESULT"
                FAILED=1
              fi
            done
          done

          if [ "$A11Y_RESULT" != "success" ]; then
            echo "❌ a11y: $A11Y_RESULT"
            FAILED=1
          fi
          if [ "$MD_ROUNDTRIP_RESULT" != "success" ]; then
            echo "❌ md-roundtrip: $MD_ROUNDTRIP_RESULT"
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then
            echo "❌ Some tests failed"
            exit 1
          fi
          echo "✅ All tests passed"
