name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (lint, typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm lint` runs biome with `--error-on-warnings`, so any warning
      # (not just errors) fails CI. The intent is to prevent warning rot
      # — the codebase ships at zero warnings, and CI keeps it that way.
      - name: Lint (fail on warnings)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Cross-framework parity
        run: pnpm check:parity

      - name: Feature manifest parity
        run: pnpm check:feature-parity

      - name: Scenario foundation parity
        run: pnpm check:scenarios

      - name: ADR compliance harness
        run: pnpm check:adr-compliance

      - name: No-let check
        run: pnpm check:nolet

      - name: Build
        run: pnpm build

  test:
    name: Test (${{ matrix.framework }}/${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [react, vue, svelte]
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tests
        uses: ./.github/actions/test
        with:
          framework: ${{ matrix.framework }}
          browser: ${{ matrix.browser }}

      - name: Save test result
        if: always()
        run: echo "${{ job.status }}" > result.txt

      - name: Upload test result
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-result-${{ matrix.framework }}-${{ matrix.browser }}
          path: result.txt
          retention-days: 1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.framework }}-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  ssr:
    name: SSR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify core stays free of top-level browser globals
        run: pnpm check:ssr

  visual:
    name: Visual Regression
    # Snapshots are sensitive to subpixel rendering differences between
    # local machines and CI, so the visual job only runs on manual
    # dispatch. PRs that intentionally change visuals re-run this job
    # (and `test:visual:update`) locally and commit the new baselines.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Run visual regression tests
        run: pnpm test:visual

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-visual
          path: playwright-report/
          retention-days: 7

  ct-parity:
    name: CT Spec Parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify CT spec parity across frameworks
        run: pnpm check:ct-parity

  a11y:
    name: A11y (${{ matrix.framework }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [react, vue, svelte]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run a11y suite
        env:
          FRAMEWORK: ${{ matrix.framework }}
        run: pnpm "test:a11y:${FRAMEWORK}"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: a11y-report-${{ matrix.framework }}
          path: playwright-report/
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, ssr, ct-parity, a11y]
    if: always()
    steps:
      - name: Download all results
        uses: actions/download-artifact@v8
        with:
          pattern: test-result-*
          merge-multiple: false

      - name: Generate summary
        run: |
          get_status() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⏹️" ;;
              *) echo "❓" ;;
            esac
          }

          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Chromium | Firefox | WebKit |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|:--------:|:-------:|:------:|" >> $GITHUB_STEP_SUMMARY

          for framework in react vue svelte; do
            CHROMIUM=$(cat test-result-${framework}-chromium/result.txt 2>/dev/null || echo "unknown")
            FIREFOX=$(cat test-result-${framework}-firefox/result.txt 2>/dev/null || echo "unknown")
            WEBKIT=$(cat test-result-${framework}-webkit/result.txt 2>/dev/null || echo "unknown")
            FRAMEWORK_NAME=$(echo "$framework" | sed 's/.*/\u&/')
            echo "| $FRAMEWORK_NAME | $(get_status $CHROMIUM) | $(get_status $FIREFOX) | $(get_status $WEBKIT) |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Check overall result
        run: |
          FAILED=0
          for framework in react vue svelte; do
            for browser in chromium firefox webkit; do
              RESULT=$(cat test-result-${framework}-${browser}/result.txt 2>/dev/null || echo "unknown")
              if [ "$RESULT" != "success" ]; then
                echo "❌ ${framework}/${browser}: $RESULT"
                FAILED=1
              fi
            done
          done

          if [ "$FAILED" = "1" ]; then
            echo "❌ Some tests failed"
            exit 1
          fi
          echo "✅ All tests passed"
