name: CI

# Behaviour-affecting checks (test matrix, visual regression, a11y) live
# here. The workflow runs on every pull request so the required
# `Test Summary` check always reports. A `changes` job detects whether
# any file outside docs/ and *.md changed; the expensive test matrix
# runs only when it did, while `Test Summary` still reports on docs-only
# PRs. The companion `Quality` workflow covers lint, typecheck, and
# writing-rule enforcement on every PR, including Markdown-only ones.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      # A push or manual dispatch always exercises the full matrix. On a
      # pull request the matrix runs only when a file outside docs/ and
      # *.md changed; a docs-only PR skips it while `Test Summary` below
      # still reports, so the required check is always satisfied.
      - name: Detect non-docs changes
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}")
          echo "Changed files:"
          echo "$changed"
          if echo "$changed" | grep -vE '^docs/|\.md$' | grep -q .; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Test (${{ matrix.framework }}/${{ matrix.browser }})
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: [react, vue, svelte]
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run tests
        uses: ./.github/actions/test
        with:
          framework: ${{ matrix.framework }}
          browser: ${{ matrix.browser }}

      - name: Save test result
        if: always()
        run: echo "${{ job.status }}" > result.txt

      - name: Upload test result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-result-${{ matrix.framework }}-${{ matrix.browser }}
          path: result.txt
          retention-days: 1

  visual:
    name: Visual Regression
    # Snapshots are sensitive to subpixel rendering differences between
    # local machines and CI, so the visual job only runs on manual
    # dispatch. PRs that intentionally change visuals re-run this job
    # (and `test:visual:update`) locally and commit the new baselines.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Install pnpm before `setup-node` so the cache key resolution finds
      # the package manager on PATH. Reversing the order breaks the cache.
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Run visual regression tests
        run: pnpm test:visual

  a11y:
    name: A11y (${{ matrix.framework }})
    # The a11y suite now runs on Vitest Browser Mode (axe-core in-browser),
    # which removes the Playwright CT reporter hang that forced manual
    # dispatch. The job stays on manual dispatch as a conservative default
    # while the migrated suite proves stable on the runner; promoting it to
    # pull-request gating and adding it to `Test Summary` needs is a tracked
    # follow-up. `timeout-minutes` caps any hang.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        framework: [react, vue, svelte]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Install pnpm before `setup-node` so the cache key resolution finds
      # the package manager on PATH. Reversing the order breaks the cache.
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run a11y suite
        env:
          FRAMEWORK: ${{ matrix.framework }}
        run: pnpm "test:a11y:${FRAMEWORK}"

  md-roundtrip:
    name: Markdown round-trip
    # The round-trip suite drives the Pillar 3 corpus through Vizel and
    # asserts lossless parse/serialize. It now runs on Vitest Browser Mode
    # (the round-trip helper calls the live `@vizel/core` build in-browser).
    # Like the a11y suite it stays on manual dispatch as a conservative
    # default; promoting it to pull-request gating is a tracked follow-up.
    # `timeout-minutes` caps any hang.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Install pnpm before `setup-node` so the cache key resolution finds
      # the package manager on PATH. Reversing the order breaks the cache.
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Markdown round-trip suite
        run: pnpm test:md-roundtrip

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    # `Test Summary` is the single required status check (the "Protect
    # main branch" ruleset). It must report on every pull request, so it
    # depends on `changes` and runs with `if: always()`. On a docs-only
    # PR the test matrix is skipped and this job reports success;
    # otherwise it aggregates the matrix results. The former `ssr` and
    # `ct-parity` needs moved into the `quality-parity` job in
    # `quality.yml` and cannot be referenced from here. The `a11y` and
    # `md-roundtrip` suites stay on manual dispatch as a conservative
    # default after the Vitest migration, so both are not gated here;
    # promoting them to this aggregator is a tracked follow-up.
    needs: [changes, test]
    if: always()
    steps:
      - name: Note docs-only run
        if: ${{ needs.changes.outputs.code != 'true' }}
        run: |
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Docs-only change: the behaviour test matrix was skipped; no behaviour can regress." >> "$GITHUB_STEP_SUMMARY"

      - name: Download all results
        if: ${{ needs.changes.outputs.code == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: test-result-*
          merge-multiple: false

      - name: Generate summary
        if: ${{ needs.changes.outputs.code == 'true' }}
        run: |
          get_status() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              cancelled) echo "⏹️" ;;
              *) echo "❓" ;;
            esac
          }

          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Framework | Chromium | Firefox | WebKit |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|:--------:|:-------:|:------:|" >> $GITHUB_STEP_SUMMARY

          for framework in react vue svelte; do
            CHROMIUM=$(cat test-result-${framework}-chromium/result.txt 2>/dev/null || echo "unknown")
            FIREFOX=$(cat test-result-${framework}-firefox/result.txt 2>/dev/null || echo "unknown")
            WEBKIT=$(cat test-result-${framework}-webkit/result.txt 2>/dev/null || echo "unknown")
            FRAMEWORK_NAME=$(echo "$framework" | sed 's/.*/\u&/')
            echo "| $FRAMEWORK_NAME | $(get_status $CHROMIUM) | $(get_status $FIREFOX) | $(get_status $WEBKIT) |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Check overall result
        if: ${{ needs.changes.outputs.code == 'true' }}
        # The behaviour matrix reports through `test-result-*` artifacts.
        # (The `a11y` and `md-roundtrip` standalone CT jobs stay on manual
        # dispatch pending their runner-hang fix, so they are not gated
        # here.)
        run: |
          FAILED=0
          for framework in react vue svelte; do
            for browser in chromium firefox webkit; do
              RESULT=$(cat test-result-${framework}-${browser}/result.txt 2>/dev/null || echo "unknown")
              if [ "$RESULT" != "success" ]; then
                echo "❌ ${framework}/${browser}: $RESULT"
                FAILED=1
              fi
            done
          done

          if [ "$FAILED" = "1" ]; then
            echo "❌ Some tests failed"
            exit 1
          fi
          echo "✅ All tests passed"
