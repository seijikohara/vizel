name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0, 1.0.0-beta.1)"
        required: true
        type: string
      dry-run:
        description: "Dry run (validate without publishing)"
        required: false
        type: boolean
        default: false
      skip-git:
        description: "Skip git tag and GitHub Release creation"
        required: false
        type: boolean
        default: false

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate-version.outputs.version }}
    steps:
      - name: Validate version format
        id: validate-version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # Validate semver format (including prerelease)
          if [[ ! "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version format: $INPUT_VERSION"
            echo "Version must be in semver format (e.g., 1.0.0, 1.0.0-beta.1)"
            exit 1
          fi
          echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ Version format valid: $INPUT_VERSION"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Check if tag exists
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if git tag -l "v$INPUT_VERSION" | grep -q .; then
            echo "::error::Tag v$INPUT_VERSION already exists"
            exit 1
          fi
          echo "✅ Tag v$INPUT_VERSION does not exist"

  test:
    name: Test (${{ matrix.framework }})
    runs-on: ubuntu-latest
    needs: [validate]
    strategy:
      fail-fast: true
      matrix:
        framework: [react, vue, svelte]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run tests
        uses: ./.github/actions/test
        with:
          framework: ${{ matrix.framework }}
          browser: chromium

  # Build all packages first, then publish each in separate jobs for OIDC token isolation
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [validate, test]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: "11.11.0"

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update package versions
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          # The source ships at the release version, so `npm version` is often
          # a no-op; `--allow-same-version` keeps it from erroring in that case.
          pnpm --filter @vizel/core exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          pnpm --filter @vizel/headless exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          pnpm --filter @vizel/react exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          pnpm --filter @vizel/vue exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          pnpm --filter @vizel/svelte exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "✅ Set all packages to version $VERSION"

      - name: Build packages
        run: pnpm build

      - name: Verify built artifacts match release version
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          # Guard against shipping a stale or mismatched build: every built
          # package.json must report the release version, and core must carry a
          # non-empty CSS catalogue. A mismatch here aborts the release before
          # the artifact is uploaded, so a wrong-version tarball never reaches
          # the registry. See issue #666.
          fail=0
          for pkg in core headless react vue svelte; do
            built=$(node -p "require('./packages/$pkg/package.json').version")
            if [ "$built" != "$VERSION" ]; then
              echo "::error::@vizel/$pkg built version '$built' does not match release version '$VERSION'"
              fail=1
            fi
          done
          if [ ! -s packages/core/dist/styles.css ]; then
            echo "::error::packages/core/dist/styles.css is missing or empty (stale or partial build)"
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "✅ All built packages report version $VERSION"

      - name: Verify package contents
        run: |
          echo "## 📦 Package Contents" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for pkg in core headless react vue svelte; do
            echo "### @vizel/$pkg" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            (cd packages/$pkg && npm pack --dry-run 2>&1) >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            packages/*/package.json
          retention-days: 1

  # Publish headless first: @vizel/core and every adapter depend on it.
  publish-headless:
    name: Publish @vizel/headless
    runs-on: ubuntu-latest
    needs: [validate, build]
    if: ${{ !inputs.dry-run }}
    environment: npm
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Rewrite workspace dependencies
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: node scripts/rewrite-workspace-deps.mjs packages/headless/package.json "$VERSION"

      - name: Publish
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          # OIDC trusted publishing: no token needed. setup-node v6.4.0 injects a
          # dummy NODE_AUTH_TOKEN when registry-url is set; force it empty so a
          # failed OIDC exchange surfaces as a clean ENEEDAUTH rather than E404.
          # On success npm uses the OIDC token from the id-token exchange.
          NODE_AUTH_TOKEN: ""
        run: |
          PRERELEASE_TAG=""
          if [[ "$VERSION" == *-* ]]; then
            # First dot-separated segment of the prerelease identifier.
            PRERELEASE_TAG="${VERSION#*-}"
            PRERELEASE_TAG="${PRERELEASE_TAG%%.*}"
            # A prerelease must never land on the `latest` dist-tag; fall back to `next`
            # when the identifier is empty or purely numeric (e.g. 1.0.0-1).
            if [[ -z "$PRERELEASE_TAG" || "$PRERELEASE_TAG" =~ ^[0-9]+$ ]]; then
              PRERELEASE_TAG="next"
            fi
          fi
          PUBLISH_OPTS="--provenance --access public"
          if [ -n "$PRERELEASE_TAG" ]; then
            PUBLISH_OPTS="$PUBLISH_OPTS --tag $PRERELEASE_TAG"
            echo "📌 Publishing @vizel/headless with tag: $PRERELEASE_TAG"
          fi
          cd packages/headless && npm publish $PUBLISH_OPTS
          echo "✅ Published @vizel/headless@$VERSION"

  # Publish core next: it depends on @vizel/headless and is depended on by the adapters.
  publish-core:
    name: Publish @vizel/core
    runs-on: ubuntu-latest
    needs: [validate, build, publish-headless]
    if: ${{ !inputs.dry-run }}
    environment: npm
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Rewrite workspace dependencies
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: node scripts/rewrite-workspace-deps.mjs packages/core/package.json "$VERSION"

      - name: Publish
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          # OIDC trusted publishing: no token needed. setup-node v6.4.0 injects a
          # dummy NODE_AUTH_TOKEN when registry-url is set; force it empty so a
          # failed OIDC exchange surfaces as a clean ENEEDAUTH rather than E404.
          # On success npm uses the OIDC token from the id-token exchange.
          NODE_AUTH_TOKEN: ""
        run: |
          PRERELEASE_TAG=""
          if [[ "$VERSION" == *-* ]]; then
            # First dot-separated segment of the prerelease identifier.
            PRERELEASE_TAG="${VERSION#*-}"
            PRERELEASE_TAG="${PRERELEASE_TAG%%.*}"
            # A prerelease must never land on the `latest` dist-tag; fall back to `next`
            # when the identifier is empty or purely numeric (e.g. 1.0.0-1).
            if [[ -z "$PRERELEASE_TAG" || "$PRERELEASE_TAG" =~ ^[0-9]+$ ]]; then
              PRERELEASE_TAG="next"
            fi
          fi
          PUBLISH_OPTS="--provenance --access public"
          if [ -n "$PRERELEASE_TAG" ]; then
            PUBLISH_OPTS="$PUBLISH_OPTS --tag $PRERELEASE_TAG"
            echo "📌 Publishing @vizel/core with tag: $PRERELEASE_TAG"
          fi
          cd packages/core && npm publish $PUBLISH_OPTS
          echo "✅ Published @vizel/core@$VERSION"

  # Publish framework packages in parallel (each job has its own OIDC token)
  publish-framework:
    name: Publish @vizel/${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: [validate, build, publish-core]
    if: ${{ !inputs.dry-run }}
    environment: npm
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package: [react, vue, svelte]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          registry-url: "https://registry.npmjs.org"

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifacts
          path: packages

      - name: Rewrite workspace dependencies
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        # Resolve every workspace:^ spec (@vizel/core and @vizel/headless) to the
        # release version. npm publish ships workspace: protocol verbatim, which
        # aborts a consumer install with EUNSUPPORTEDPROTOCOL, so this rewrite is
        # mandatory before publishing.
        run: node scripts/rewrite-workspace-deps.mjs packages/${{ matrix.package }}/package.json "$VERSION"

      - name: Publish
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          # OIDC trusted publishing: no token needed. setup-node v6.4.0 injects a
          # dummy NODE_AUTH_TOKEN when registry-url is set; force it empty so a
          # failed OIDC exchange surfaces as a clean ENEEDAUTH rather than E404.
          # On success npm uses the OIDC token from the id-token exchange.
          NODE_AUTH_TOKEN: ""
        run: |
          PRERELEASE_TAG=""
          if [[ "$VERSION" == *-* ]]; then
            # First dot-separated segment of the prerelease identifier.
            PRERELEASE_TAG="${VERSION#*-}"
            PRERELEASE_TAG="${PRERELEASE_TAG%%.*}"
            # A prerelease must never land on the `latest` dist-tag; fall back to `next`
            # when the identifier is empty or purely numeric (e.g. 1.0.0-1).
            if [[ -z "$PRERELEASE_TAG" || "$PRERELEASE_TAG" =~ ^[0-9]+$ ]]; then
              PRERELEASE_TAG="next"
            fi
          fi
          PUBLISH_OPTS="--provenance --access public"
          if [ -n "$PRERELEASE_TAG" ]; then
            PUBLISH_OPTS="$PUBLISH_OPTS --tag $PRERELEASE_TAG"
            echo "📌 Publishing @vizel/${{ matrix.package }} with tag: $PRERELEASE_TAG"
          fi
          cd packages/${{ matrix.package }} && npm publish $PUBLISH_OPTS
          echo "✅ Published @vizel/${{ matrix.package }}@$VERSION"

  # Finalize: commit version changes and create release
  finalize:
    name: Finalize
    runs-on: ubuntu-latest
    needs: [validate, build, publish-core, publish-framework]
    if: ${{ !inputs.dry-run && !inputs.skip-git }}
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ vars.DEV_AUTOMATION_CLIENT_ID }}
          private-key: ${{ secrets.DEV_AUTOMATION_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: "11.11.0"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version changes
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          pnpm --filter @vizel/core exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          pnpm --filter @vizel/headless exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          pnpm --filter @vizel/react exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          pnpm --filter @vizel/vue exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          pnpm --filter @vizel/svelte exec npm version "$VERSION" --no-git-tag-version --allow-same-version
          git add -A
          # The source may already be at the release version; commit only when
          # `npm version` changed a file. The tag is the load-bearing artifact.
          git diff --staged --quiet || git commit -m "chore(release): v$VERSION"
          git tag "v$VERSION"
          git push origin main --tags
          echo "✅ Tagged v$VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          tag_name: v${{ needs.validate.outputs.version }}
          name: v${{ needs.validate.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}

      - name: Summary
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          DRY_RUN: ${{ inputs.dry-run }}
          SKIP_GIT: ${{ inputs.skip-git }}
        run: |
          echo "## 📦 Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$DRY_RUN" = "true" ]; then
            echo "🔍 **Mode:** Dry Run" >> $GITHUB_STEP_SUMMARY
          elif [ "$SKIP_GIT" = "true" ]; then
            echo "🚀 **Mode:** Published (npm only, no git tag/release)" >> $GITHUB_STEP_SUMMARY
          else
            echo "🚀 **Mode:** Published" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`$VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| @vizel/core | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| @vizel/headless | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| @vizel/react | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| @vizel/vue | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| @vizel/svelte | ✅ |" >> $GITHUB_STEP_SUMMARY

          if [ "$DRY_RUN" != "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Links" >> $GITHUB_STEP_SUMMARY
            echo "- [npm: @vizel/core](https://www.npmjs.com/package/@vizel/core)" >> $GITHUB_STEP_SUMMARY
            echo "- [npm: @vizel/headless](https://www.npmjs.com/package/@vizel/headless)" >> $GITHUB_STEP_SUMMARY
            echo "- [npm: @vizel/react](https://www.npmjs.com/package/@vizel/react)" >> $GITHUB_STEP_SUMMARY
            echo "- [npm: @vizel/vue](https://www.npmjs.com/package/@vizel/vue)" >> $GITHUB_STEP_SUMMARY
            echo "- [npm: @vizel/svelte](https://www.npmjs.com/package/@vizel/svelte)" >> $GITHUB_STEP_SUMMARY
          fi
