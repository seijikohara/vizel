# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    oxfmt:
      glob: "*.{js,ts,cjs,mjs,jsx,tsx,json,jsonc,vue,svelte,css,yml,yaml,md}"
      # oxfmt's ignorePatterns (.oxfmtrc.json) excludes pnpm-lock.yaml, but the
      # glob above still matches it. When a commit's staged set is
      # lockfile-only, oxfmt receives zero effective targets after filtering
      # and exits non-zero by default; opt into its documented flag so that
      # case is a no-op instead of a hook failure.
      run: pnpm exec oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    oxlint:
      glob: "*.{js,ts,cjs,mjs,jsx,tsx,vue,svelte}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true

    typecheck-core:
      glob: "packages/core/**/*.ts"
      run: pnpm --filter @vizel/core typecheck

    typecheck-react:
      glob: "packages/react/**/*.{ts,tsx}"
      run: pnpm --filter @vizel/react typecheck

    typecheck-vue:
      glob: "packages/vue/**/*.{ts,vue}"
      run: pnpm --filter @vizel/vue typecheck

    typecheck-svelte:
      glob: "packages/svelte/**/*.{ts,svelte}"
      run: pnpm --filter @vizel/svelte typecheck

commit-msg:
  commands:
    commitlint:
      run: |
        # Validate commit message follows Conventional Commits
        message=$(cat {1})
        if ! echo "$message" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+"; then
          echo "Error: Commit message must follow Conventional Commits format"
          echo "Examples:"
          echo "  feat: add new feature"
          echo "  fix(core): resolve bug in editor"
          echo "  docs: update README"
          exit 1
        fi

pre-push:
  parallel: true
  commands:
    lint:
      run: pnpm lint

    typecheck:
      run: pnpm typecheck

    headless-test:
      run: pnpm --filter @vizel/headless test

    feature-parity:
      run: pnpm check:feature-parity

    aria-contract:
      run: pnpm check:aria-contract

    scenarios:
      run: pnpm check:scenarios

    adr-compliance:
      run: pnpm check:adr-compliance

    ct-parity:
      run: pnpm check:ct-parity

    ssr:
      run: pnpm check:ssr

    nolet:
      run: pnpm check:nolet
