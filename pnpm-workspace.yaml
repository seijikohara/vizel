packages:
  - "packages/*"
  - "apps/demo/*"

# Approve post-install build scripts for trusted tooling dependencies.
# pnpm 10+ disables build scripts by default; these packages need their
# build/install hooks to run for native binaries and git hook setup.
allowBuilds:
  "@parcel/watcher": true
  esbuild: true
  lefthook: true
  leveldown: true

# Resolution overrides used to lock the @tiptap, React, and Vite
# versions consumed by every workspace package to the same release.
# Lives in pnpm-workspace.yaml because pnpm v11 stopped reading
# `pnpm.overrides` from the root package.json.
overrides:
  "@tiptap/core": "$@tiptap/core"
  "@tiptap/extension-collaboration": "$@tiptap/extension-collaboration"
  "@tiptap/pm": "$@tiptap/pm"
  "@tiptap/suggestion": "$@tiptap/suggestion"
  "react": "$react"
  "react-dom": "$react-dom"
  "vite": "$vite"
